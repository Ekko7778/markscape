<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书签管理器</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== 基础重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== CSS变量 ========== */
        :root {
            --bg-primary: #0F172A;
            --bg-secondary: #1E293B;
            --bg-card: rgba(30, 41, 59, 0.85);
            --bg-card-hover: rgba(40, 55, 85, 0.90);
            --text-primary: #F8FAFC;
            --text-secondary: rgba(160, 180, 210, 0.85);
            --text-muted: #64748B;
            --accent: #22C55E;
            --accent-hover: #16A34A;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* 浅色模式 */
        [data-theme="light"] {
            --bg-primary: #F1F5F9;
            --bg-secondary: #FFFFFF;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-card-hover: rgba(255, 255, 255, 1);
            --text-primary: #1E293B;
            --text-secondary: rgba(60, 80, 100, 0.85);
            --text-muted: #94A3B8;
            --border: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 0, 0, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(0, 0, 0, 0.1);
            --shadow: rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        /* ========== 页面基础 ========== */
        html {
            overflow-y: auto;
            scrollbar-gutter: stable;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
        }

        /* 自定义滚动条 - 不滚动时隐藏 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: transparent;
            border-radius: 4px;
            transition: background 0.3s;
        }

        html:not(:hover)::-webkit-scrollbar-thumb,
        body:not(:hover)::-webkit-scrollbar-thumb {
            background: transparent;
        }

        html:hover::-webkit-scrollbar-thumb,
        body:hover::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Firefox 滚动条 */
        * {
            scrollbar-width: thin;
            scrollbar-color: transparent transparent;
        }

        html:hover,
        body:hover {
            scrollbar-color: var(--border) transparent;
        }

        /* ========== 导航栏 ========== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            height: 65px;
        }

        /* 顶部栏 */
        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 12px 20px;
            max-width: 100%;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-primary);
            position: fixed;
            top: 12px;
            left: 20px;
            z-index: 102;
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .logo i {
            color: var(--accent);
        }

        .search-box {
            flex: 0 0 220px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 32px 10px 36px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .search-box .clear-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            width: 20px;
            height: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            line-height: 1;
        }

        .search-box .clear-btn:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #EF4444;
            transform: translateY(-50%) scale(1.1);
        }

        .search-box .clear-btn:active {
            transform: translateY(-50%) scale(0.95);
        }

        .search-box .clear-btn:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .search-box .clear-btn.visible {
            display: flex;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 按钮分组 */
        .action-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 数据操作组前加分隔线 */
        .action-group.data-ops {
            padding-left: 12px;
            margin-left: 8px;
            border-left: 1px solid var(--border);
        }

        /* 次要操作组前加分隔线 */
        .secondary-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-left: 12px;
            margin-left: 8px;
            border-left: 1px solid var(--border);
        }

        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            height: 36px;
        }

        .btn:hover {
            background: var(--bg-card);
            border-color: var(--border-hover);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: var(--bg-card);
            border-color: var(--border-hover);
        }

        /* 危险操作图标按钮 */
        .btn-danger-icon:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #EF4444;
            color: #EF4444;
        }

        /* 添加分类按钮 */
        #addCategoryBtn:hover {
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 主题切换按钮 - 最右边 */
        .theme-toggle {
            position: fixed;
            top: 12px;
            right: 20px;
            z-index: 101;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            transform: rotate(15deg);
        }

        /* ========== 整体布局 ========== */
        .layout {
            display: flex;
            min-height: calc(100vh - 65px);
        }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: 220px;
            flex-shrink: 0;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            position: sticky;
            top: 65px;
            height: calc(100vh - 65px);
        }

        .sidebar-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 4px 12px 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .sidebar-item:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .sidebar-item.active {
            background: var(--accent);
            color: #fff;
        }

        .sidebar-item i {
            font-size: 0.85rem;
            width: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar-item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-item-count {
            font-size: 0.7rem;
            padding: 1px 7px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }

        .sidebar-item.active .sidebar-item-count {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 右键菜单 */
        .context-menu {
            position: fixed;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px;
            min-width: 120px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            display: none;
        }

        .context-menu.show {
            display: block;
        }

        .context-menu-item {
            padding: 10px 14px;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.875rem;
            color: var(--text-primary);
            transition: all 0.15s;
        }

        .context-menu-item:hover {
            background: var(--bg-primary);
        }

        .context-menu-item i {
            width: 16px;
            text-align: center;
            font-size: 0.8rem;
        }

        .context-menu-item.edit i {
            color: var(--accent);
        }

        .context-menu-item.delete i {
            color: #EF4444;
        }

        .context-menu-item.delete:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* ========== 主内容区 ========== */
        .main {
            flex: 1;
            min-width: 0;
            padding: 16px 24px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* 卡片网格 */
        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 270px);
            gap: 8px;
            justify-content: center;
            width: 100%;
            max-width: 1382px;
        }

        /* 书签卡片动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bookmark-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 6px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.25s ease forwards;
            opacity: 0;
            height: 130px;
            overflow: hidden;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bookmark-card:hover {
            transform: translateY(-2px);
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3),
                        0 0 20px rgba(34, 197, 94, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .bookmark-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .bookmark-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .bookmark-icon img {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            image-rendering: auto;
        }

        .bookmark-icon i {
            font-size: 1.1rem;
            color: var(--accent);
        }

        .bookmark-info {
            flex: 1;
            min-width: 0;
        }

        .bookmark-title {
            font-size: 0.98rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bookmark-url {
            font-size: 0.75rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bookmark-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 1.4em;
            margin-top: 2px;
        }

        .bookmark-tag {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent);
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
        }

        .bookmark-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            min-height: 20px;
        }

        .bookmark-tags {
            flex: 1;
            display: flex;
            flex-wrap: nowrap;
            overflow: hidden;
            gap: 4px;
        }

        .copy-btn {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 20px;
            border: none;
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent);
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-left: auto;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: rgba(34, 197, 94, 0.25);
        }

        .copy-btn.copied {
            background: var(--accent);
            color: #fff;
        }

        .copy-btn.copied span {
            display: none;
        }

        .copy-btn.copied::after {
            content: '已复制';
        }

        .bookmark-card:hover .copy-btn {
            display: flex;
        }

        .bookmark-actions {
            display: none;
            gap: 4px;
            margin-left: auto;
        }

        .bookmark-card:hover .bookmark-actions {
            display: flex;
        }

        .action-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .action-btn.delete:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #EF4444;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 24px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 2rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 0.95rem;
            margin-bottom: 16px;
            color: var(--text-secondary);
        }

        .empty-state .btn {
            margin-top: 4px;
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }

        .form-group textarea{
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .input-with-btn {
            display: flex;
            gap: 8px;
        }

        .input-with-btn input {
            flex: 1;
        }

        .input-btn {
            padding: 0 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .input-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* 自定义下拉框 */
        .custom-select {
            position: relative;
        }

        .custom-select input {
            width: 100%;
            padding-right: 36px;
        }

        .custom-select .dropdown-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            transition: transform 0.2s;
        }

        .custom-select.open .dropdown-icon {
            transform: translateY(-50%) rotate(180deg);
        }

        .custom-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 0;
            overflow: hidden;
            background: var(--bg-secondary);
            border: 1px solid transparent;
            border-radius: 10px;
            margin-top: 4px;
            z-index: 100;
            transition: all 0.2s ease;
            box-shadow: none;
        }

        .custom-select.open .custom-select-dropdown {
            max-height: 200px;
            overflow-y: auto;
            border-color: var(--border);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .custom-select-option {
            padding: 10px 14px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .custom-select-option:hover {
            background: var(--bg-primary);
        }

        .custom-select-option.selected {
            color: var(--accent);
            background: rgba(34, 197, 94, 0.1);
        }

        .custom-select-option i {
            width: 16px;
            text-align: center;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            padding: 20px 24px;
            border-top: 1px solid var(--border);
        }

        /* ========== Toast 通知 ========== */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px var(--shadow);
            animation: toastIn 0.3s ease;
            max-width: 320px;
        }

        .toast.success {
            border-color: var(--accent);
        }

        .toast.success i {
            color: var(--accent);
        }

        .toast.error {
            border-color: #EF4444;
        }

        .toast.error i {
            color: #EF4444;
        }

        .toast.warning {
            border-color: #F59E0B;
        }

        .toast.warning i {
            color: #F59E0B;
        }

        .toast.hide {
            animation: toastOut 0.3s ease forwards;
            margin-bottom: -48px;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
                margin-bottom: 0;
            }
            to {
                opacity: 0;
                transform: translateX(100%);
                margin-bottom: -48px;
            }
        }

        /* ========== 搜索高亮 ========== */
        mark {
            background: rgba(34, 197, 94, 0.35);
            color: inherit;
            padding: 0 2px;
            border-radius: 2px;
        }

        /* ========== 拖拽排序 ========== */
        .bookmark-card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }

        .bookmark-card.drag-over {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.3);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .header-content {
                flex-wrap: wrap;
            }

            .search-box {
                order: 3;
                max-width: 100%;
                width: 100%;
            }

            .bookmarks-grid {
                grid-template-columns: 1fr;
            }

            .logo span {
                display: none;
            }

            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                position: static;
                height: auto;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 6px;
                padding: 12px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .sidebar-title {
                width: 100%;
                border-bottom: none;
                margin-bottom: 0;
                padding-bottom: 4px;
            }

            .sidebar-item {
                flex: 0 0 auto;
                padding: 6px 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- Logo 固定在左上角 -->
    <div class="logo">
        <i class="fas fa-bookmark"></i>
        <span>书签管理器</span>
    </div>

    <!-- 导航栏 -->
    <header class="header">
        <div class="header-top">
            <div class="actions">
                <!-- 主要操作 -->
                <button class="btn btn-primary" id="addBookmarkBtn">
                    <i class="fas fa-plus"></i>
                    <span>添加书签</span>
                </button>
                <button class="btn" id="addCategoryBtn">
                    <i class="fas fa-folder-plus"></i>
                    <span>新建分类</span>
                </button>
                <!-- 数据操作 -->
                <div class="action-group data-ops">
                    <button class="btn" id="importBtn">
                        <i class="fas fa-file-import"></i>
                        <span>导入</span>
                    </button>
                    <button class="btn" id="exportBtn">
                        <i class="fas fa-file-export"></i>
                        <span>导出</span>
                    </button>
                </div>
                <!-- 次要操作（分隔线后） -->
                <div class="action-group secondary-actions">
                    <button class="btn btn-icon btn-danger-icon" id="clearAllBtn" title="清空所有书签">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
                <!-- 搜索框 -->
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="搜索书签...">
                    <button class="clear-btn" id="clearSearchBtn" title="清空搜索">×</button>
                </div>
            </div>
            <button class="btn btn-icon theme-toggle" id="themeToggle" title="切换主题">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <!-- 布局容器：侧边栏 + 主内容 -->
    <div class="layout">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">分类</div>
            <!-- 侧边栏项目由JS动态生成 -->
        </aside>

        <!-- 主内容区 -->
        <main class="main">
            <div class="bookmarks-grid" id="bookmarksGrid">
                <!-- 书签卡片由JS动态生成 -->
            </div>
            <div class="empty-state" id="emptyState" style="display: none;">
                <i class="fas fa-bookmark"></i>
                <p>暂无书签</p>
                <button class="btn btn-primary" onclick="openAddModal()">
                    <i class="fas fa-plus"></i>
                    添加第一个书签
                </button>
            </div>
        </main>
    </div>

    <!-- 添加/编辑书签模态框 -->
    <div class="modal-overlay" id="bookmarkModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">添加书签</h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>URL *</label>
                    <div class="input-with-btn">
                        <input type="url" id="bookmarkUrl" placeholder="https://example.com">
                        <button type="button" class="input-btn" id="openUrlBtn" title="在新标签页打开">
                            <i class="fas fa-external-link-alt"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="bookmarkTitle" placeholder="网站标题">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="bookmarkDesc" placeholder="简短描述（可选）"></textarea>
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <div class="custom-select" id="categorySelect">
                        <input type="text" id="bookmarkCategory" placeholder="选择或输入分类名称" autocomplete="off">
                        <i class="fas fa-chevron-down dropdown-icon"></i>
                        <div class="custom-select-dropdown" id="categoryDropdown">
                            <!-- 由JS动态生成 -->
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>标签（回车键添加逗号分隔）</label>
                    <input type="text" id="bookmarkTags" placeholder="工具, 开发, 学习">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveBookmark()">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加分类模态框 -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="categoryModalTitle">添加分类</h2>
                <button class="modal-close" onclick="closeCategoryModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>分类名称 *</label>
                    <input type="text" id="categoryName" placeholder="例如：工作、学习、娱乐">
                </div>
                <div class="form-group">
                    <label>图标</label>
                    <select id="categoryIcon">
                        <option value="fa-folder">📁 文件夹</option>
                        <option value="fa-briefcase">💼 工作</option>
                        <option value="fa-graduation-cap">🎓 学习</option>
                        <option value="fa-gamepad">🎮 娱乐</option>
                        <option value="fa-code">💻 开发</option>
                        <option value="fa-palette">🎨 设计</option>
                        <option value="fa-newspaper">📰 新闻</option>
                        <option value="fa-shopping-cart">🛒 购物</option>
                        <option value="fa-heart">❤️ 收藏</option>
                        <option value="fa-star">⭐ 精选</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeCategoryModal()">取消</button>
                <button class="btn btn-primary" onclick="saveCategory()">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除分类确认模态框 -->
    <div class="modal-overlay" id="deleteCategoryModal">
        <div class="modal">
            <div class="modal-header">
                <h2>确认删除分类</h2>
                <button class="modal-close" onclick="closeDeleteCategoryModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 16px; color: var(--text-secondary);">
                    确定要删除分类 "<span id="deleteCategoryName" style="color: var(--text-primary); font-weight: 500;"></span>" 吗？
                </p>
                <p style="margin-bottom: 8px; color: var(--text-muted); font-size: 0.875rem;">
                    该分类下有 <span id="deleteCategoryCount" style="color: var(--accent); font-weight: 600;"></span> 个书签
                </p>
            </div>
            <div class="modal-footer" style="flex-wrap: wrap; gap: 8px;">
                <button class="btn" onclick="closeDeleteCategoryModal()">取消</button>
                <button class="btn" onclick="confirmDeleteCategory(true)" style="background: var(--accent); border-color: var(--accent); color: #fff;">
                    <i class="fas fa-bookmark"></i> 保留书签
                </button>
                <button class="btn" onclick="confirmDeleteCategory(false)" style="background: #EF4444; border-color: #EF4444; color: #fff;">
                    <i class="fas fa-trash"></i> 一并删除
                </button>
            </div>
        </div>
    </div>

    <!-- 导出格式选择模态框 -->
    <div class="modal-overlay" id="exportModal">
        <div class="modal">
            <div class="modal-header">
                <h2>选择导出格式</h2>
                <button class="modal-close" onclick="closeExportModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" style="display: flex; gap: 16px; padding-top: 8px;">
                <button class="btn" onclick="doExport('json')" style="flex: 1; flex-direction: column; height: auto; padding: 20px; gap: 10px;">
                    <i class="fas fa-file-code" style="font-size: 1.8rem; color: #F59E0B;"></i>
                    <span style="font-weight: 600;">JSON</span>
                    <span style="font-size: 0.75rem; color: var(--text-muted);">完整数据，可再导入</span>
                </button>
                <button class="btn" onclick="doExport('html')" style="flex: 1; flex-direction: column; height: auto; padding: 20px; gap: 10px;">
                    <i class="fas fa-file-alt" style="font-size: 1.8rem; color: #3B82F6;"></i>
                    <span style="font-weight: 600;">HTML</span>
                    <span style="font-size: 0.75rem; color: var(--text-muted);">浏览器书签格式</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="importInput" accept=".json,.html" style="display: none;">

    <!-- Toast 通知容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 分类右键菜单 -->
    <div class="context-menu" id="categoryContextMenu">
        <div class="context-menu-item edit" id="ctxEditCategory">
            <i class="fas fa-pen"></i>
            <span>编辑分类</span>
        </div>
        <div class="context-menu-item delete" id="ctxDeleteCategory">
            <i class="fas fa-trash"></i>
            <span>删除分类</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
