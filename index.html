<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾光 Markscape</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // 在页面渲染前应用主题，防止闪屏
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
    </script>
    <style>
        /* ========== 基础重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== CSS变量 ========== */
        :root {
            --bg-primary: #0F172A;
            --bg-secondary: #1E293B;
            --bg-card: rgba(30, 41, 59, 0.85);
            --bg-card-hover: rgba(40, 55, 85, 0.90);
            --text-primary: #F8FAFC;
            --text-secondary: rgba(160, 180, 210, 0.85);
            --text-muted: #64748B;
            --accent: #22C55E;
            --accent-hover: #16A34A;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
            /* 磨砂玻璃 */
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* 浅色模式 */
        [data-theme="light"] {
            --bg-primary: #F1F5F9;
            --bg-secondary: #FFFFFF;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-card-hover: rgba(255, 255, 255, 1);
            --text-primary: #1E293B;
            --text-secondary: rgba(60, 80, 100, 0.85);
            --text-muted: #94A3B8;
            --border: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 0, 0, 0.15);
            --shadow: rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
            /* 磨砂玻璃 */
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(0, 0, 0, 0.08);
        }



        /* ========== 磨砂玻璃效果 ========== */
        .liquid-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 24px var(--shadow);
        }

        /* ========== 页面基础 ========== */
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }

        /* 自定义滚动条 - 不滚动时隐藏 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: transparent;
            border-radius: 4px;
            transition: background 0.3s;
        }

        html:not(:hover)::-webkit-scrollbar-thumb,
        body:not(:hover)::-webkit-scrollbar-thumb {
            background: transparent;
        }

        html:hover::-webkit-scrollbar-thumb,
        body:hover::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Firefox 滚动条 */
        * {
            scrollbar-width: thin;
            scrollbar-color: transparent transparent;
        }

        html:hover,
        body:hover {
            scrollbar-color: var(--border) transparent;
        }

        /* ========== 导航栏 ========== */
        .header {
            position: relative;
            z-index: 100;
            padding: 8px 8px 0 8px;
            flex-shrink: 0;
        }

        /* 顶部栏 */
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .logo img {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .logo h3 {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: 1px;
            margin: 0;
        }

        .logo span {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-tertiary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 360px;
            margin: 0 auto;
        }

        .search-box input {
            width: 100%;
            padding: 8px 32px 8px 36px;
            background: var(--bg-card);
            border: 1px solid var(--border-hover);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .search-box input:hover {
            border-color: var(--text-muted);
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .search-box input:focus ~ i,
        .search-box:hover i {
            color: var(--accent);
        }

        .search-box .clear-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            width: 20px;
            height: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            line-height: 1;
        }

        .search-box .clear-btn:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #EF4444;
            transform: translateY(-50%) scale(1.1);
        }

        .search-box .clear-btn:active {
            transform: translateY(-50%) scale(0.95);
        }

        .search-box .clear-btn.visible {
            display: flex;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
            height: 36px;
        }

        .btn:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* 危险操作图标按钮 */
        .btn-danger-icon:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #EF4444;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            background: transparent;
            border: none;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            flex-shrink: 0;
            overflow: hidden;
        }

        .theme-toggle:hover {
            background: var(--bg-primary);
            color: var(--accent);
        }

        .theme-icon {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        color 0.3s ease;
        }

        .theme-toggle:hover .theme-icon {
            transform: rotate(30deg);
        }

        .theme-rays line {
            transition: opacity 0.3s ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: 12px 12px;
        }

        .theme-moon {
            transition: opacity 0.3s ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }

        .theme-sun {
            transition: opacity 0.3s ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }

        /* 亮色模式：太阳 */
        [data-theme="light"] .theme-rays line {
            opacity: 1;
            transform: scale(1);
        }

        [data-theme="light"] .theme-sun {
            opacity: 1;
            transform: scale(1);
        }

        [data-theme="light"] .theme-moon {
            opacity: 0;
            transform: scale(0.5) rotate(-30deg);
        }

        /* 暗色模式：月亮 */
        [data-theme="dark"] .theme-rays line {
            opacity: 0;
            transform: scale(0.5);
        }

        [data-theme="dark"] .theme-sun {
            opacity: 0;
            transform: scale(0.5);
        }

        [data-theme="dark"] .theme-moon {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        /* ========== 悬浮添加按钮 ========== */
        .fab-btn {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 90;
        }

        .fab-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 24px rgba(34, 197, 94, 0.5);
        }

        .fab-btn:active {
            transform: scale(0.95);
        }

        .fab-btn-label {
            position: absolute;
            right: calc(100% + 10px);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transform: translateX(4px);
            transition: all 0.2s;
        }

        .fab-btn:hover .fab-btn-label {
            opacity: 1;
            transform: translateX(0);
        }

        /* ========== 整体布局 ========== */
        .layout {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: 220px;
            flex-shrink: 0;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-y: auto;
            border-radius: 12px;
            margin-left: 8px;
        }

        .sidebar-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            padding: 8px 10px 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title-btn {
            background: transparent;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.15s;
        }

        .sidebar-title-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 11px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.92rem;
            font-weight: 400;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .sidebar-item:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .sidebar-item.active {
            background: var(--accent);
            color: #fff;
        }

        .sidebar-item .sidebar-icon {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            background: #6366f122;
            color: #6366f1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.75rem;
            transition: background 0.15s;
        }

        .sidebar-item:hover .sidebar-icon {
            background: var(--bg-card);
        }

        .sidebar-item.active .sidebar-icon {
            background: rgba(255, 255, 255, 0.2) !important;
        }

        /* 深色模式下分类图标方块背景改为白色 */
        [data-theme="dark"] .sidebar-item .sidebar-icon {
            background: #ffffff !important;
        }

        [data-theme="dark"] .sidebar-item:hover .sidebar-icon {
            background: #ffffff !important;
        }

        [data-theme="dark"] .sidebar-item.active .sidebar-icon {
            background: rgba(255, 255, 255, 0.2) !important;
        }

        .sidebar-item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-item-count {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--border);
            flex-shrink: 0;
        }

        .sidebar-item.active .sidebar-item-count {
            background: rgba(255, 255, 255, 0.2) !important;
        }

        .sidebar-bottom {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: auto;
            padding-top: 8px;
        }

        .sidebar-bottom .btn {
            flex: 1;
            justify-content: center;
            font-size: 0.8rem;
            padding: 6px 8px;
            height: 32px;
        }

        /* 右键菜单 */
        .context-menu {
            position: fixed;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px;
            min-width: 120px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            display: none;
        }

        .context-menu.show {
            display: block;
        }

        .context-menu-item {
            padding: 10px 14px;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.875rem;
            color: var(--text-primary);
            transition: all 0.15s;
        }

        .context-menu-item:hover {
            background: var(--bg-primary);
        }

        .context-menu-item i {
            width: 16px;
            text-align: center;
            font-size: 0.8rem;
        }

        .context-menu-item.edit i {
            color: var(--accent);
        }

        .context-menu-item.delete i {
            color: #EF4444;
        }

        .context-menu-item.delete:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* ========== 主内容区 ========== */
        .main {
            flex: 1;
            min-width: 0;
            padding: 16px 24px 16px;
        }

        /* 卡片网格 */
        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 290px);
            gap: 8px;
            justify-content: center;
            width: 100%;
            max-width: 1382px;
        }

        /* 书签卡片动画 */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translate3d(0, 30px, 0);
            }
            100% {
                opacity: 1;
                transform: none;
            }
        }

        .bookmark-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: scale 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        box-shadow 0.3s ease,
                        background 0.25s ease,
                        border-color 0.25s ease,
                        backdrop-filter 0.25s ease;
            scale: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.6s ease both;
            opacity: 0;
            height: 130px;
            overflow: hidden;
        }

        .bookmark-card:hover {
            scale: 1.04;
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15),
                        0 4px 10px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .bookmark-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .bookmark-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .favicon-refresh {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 0.75rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .bookmark-icon:hover .favicon-refresh {
            opacity: 1;
        }

        .favicon-refresh:hover {
            background: rgba(34, 197, 94, 0.5);
        }

        .bookmark-icon img {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            image-rendering: auto;
        }

        .bookmark-icon i {
            font-size: 1.1rem;
            color: var(--accent);
        }

        .bookmark-info {
            flex: 1;
            min-width: 0;
        }

        .bookmark-title {
            font-size: 0.98rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bookmark-url {
            font-size: 0.75rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bookmark-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 1.4em;
            margin-top: 2px;
        }

        .bookmark-tag {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent);
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
        }

        .bookmark-tag.category-tag {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            max-width: none;
            overflow: visible;
        }

        .bookmark-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            min-height: 20px;
        }

        .bookmark-tags {
            flex: 1;
            display: flex;
            flex-wrap: nowrap;
            overflow: hidden;
            gap: 4px;
        }

        .copy-btn {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 20px;
            border: none;
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent);
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-left: auto;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: rgba(34, 197, 94, 0.25);
        }

        .copy-btn.copied {
            background: var(--accent);
            color: #fff;
        }

        .copy-btn.copied span {
            display: none;
        }

        .copy-btn.copied::after {
            content: '已复制';
        }

        .bookmark-card:hover .copy-btn {
            display: flex;
        }

        .bookmark-actions {
            display: none;
            gap: 4px;
            margin-left: auto;
        }

        .bookmark-card:hover .bookmark-actions {
            display: flex;
        }

        .action-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .action-btn.delete:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #EF4444;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 400px;
            padding: 80px 24px;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-state .empty-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .empty-state .empty-icon:hover {
            background: rgba(34, 197, 94, 0.25);
            border-color: rgba(34, 197, 94, 0.5);
            transform: scale(1.05);
        }

        .empty-state .empty-icon i {
            font-size: 2rem;
            color: var(--accent);
            transition: opacity 0.2s;
        }

        .empty-state .empty-icon:hover i {
            opacity: 0;
        }

        .empty-state .empty-icon::after {
            content: '\f067';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--accent);
            position: absolute;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .empty-state .empty-icon:hover::after {
            opacity: 1;
        }

        .empty-state .empty-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-align: center;
        }

        .empty-state .empty-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.5;
            text-align: center;
        }

        .empty-state .btn {
            padding: 10px 24px;
            border-radius: 10px;
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.95) translateY(10px);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                        opacity 0.25s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }

        .form-group textarea{
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .input-with-btn {
            display: flex;
            gap: 8px;
        }

        .input-with-btn input {
            flex: 1;
        }

        .input-btn {
            padding: 0 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .input-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* 自定义下拉框 */
        .custom-select {
            position: relative;
        }

        .custom-select input {
            width: 100%;
            padding-right: 60px;
        }

        .clear-category-btn {
            position: absolute;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 4px;
            font-size: 0.75rem;
            display: none;
            z-index: 1;
        }

        .clear-category-btn:hover {
            color: var(--text-primary);
        }

        .custom-select input:not(:placeholder-shown) ~ .clear-category-btn {
            display: block;
        }

        .custom-select .dropdown-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            transition: transform 0.2s;
        }

        .custom-select.open .dropdown-icon {
            transform: translateY(-50%) rotate(180deg);
        }

        .custom-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 0;
            overflow: hidden;
            background: var(--bg-secondary);
            border: 1px solid transparent;
            border-radius: 10px;
            margin-top: 4px;
            z-index: 100;
            transition: all 0.2s ease;
            box-shadow: none;
        }

        .custom-select.open .custom-select-dropdown {
            max-height: 200px;
            overflow-y: auto;
            border-color: var(--border);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .custom-select-option {
            padding: 10px 14px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .custom-select-option:hover {
            background: var(--bg-primary);
        }

        .custom-select-option.selected {
            color: var(--accent);
            background: rgba(34, 197, 94, 0.1);
        }

        .custom-select-option i {
            width: 16px;
            text-align: center;
        }

        /* ========== 图标选择器 ========== */
        .icon-selector {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
            background: var(--bg-primary);
        }

        .icon-preview {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .icon-preview-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.2s;
        }

        .icon-color-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            padding: 10px;
            background: var(--bg-secondary, rgba(0,0,0,0.15));
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .color-options {
            display: flex;
            justify-content: space-between;
            flex: 1;
        }

        .color-dot {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .color-dot:hover {
            transform: scale(1.2);
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }

        .color-dot.active {
            border-color: #fff;
            box-shadow: 0 0 0 2px var(--bg-primary), 0 0 0 4px currentColor, 0 3px 10px rgba(0,0,0,0.3);
        }

        .color-bar-wrapper {
            position: relative;
            height: 16px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .color-bar {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            background: linear-gradient(to right,
                #EF4444, #F97316, #F59E0B, #EAB308,
                #22C55E, #14B8A6, #06B6D4, #3B82F6,
                #6366F1, #8B5CF6, #A855F7, #EC4899,
                #EF4444
            );
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }

        .color-bar-thumb {
            position: absolute;
            top: 50%;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: left 0.1s ease;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 5px;
            max-height: 220px;
            overflow-y: auto;
            padding: 4px;
        }

        .icon-section-title {
            grid-column: 1 / -1;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            padding: 8px 2px 3px;
        }

        .icon-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 1rem;
            overflow: hidden;
        }

        .icon-item i,
        .icon-item svg {
            font-size: 1rem;
            width: 1em;
            height: 1em;
        }

        .icon-item:hover {
            border-color: var(--accent);
            transform: scale(1.08);
        }

        .icon-item.selected {
            border-color: var(--accent);
            background: #ffffff;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            padding: 20px 24px;
            border-top: 1px solid var(--border);
        }

        /* ========== Toast 通知 ========== */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px var(--shadow);
            animation: toastIn 0.3s ease;
            max-width: 320px;
        }

        .toast.success {
            border-color: var(--accent);
        }

        .toast.success i {
            color: var(--accent);
        }

        .toast.error {
            border-color: #EF4444;
        }

        .toast.error i {
            color: #EF4444;
        }

        .toast.warning {
            border-color: #F59E0B;
        }

        .toast.warning i {
            color: #F59E0B;
        }

        .toast.hide {
            animation: toastOut 0.3s ease forwards;
            margin-bottom: -48px;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
                margin-bottom: 0;
            }
            to {
                opacity: 0;
                transform: translateX(100%);
                margin-bottom: -48px;
            }
        }

        /* ========== 搜索高亮 ========== */
        mark {
            background: rgba(34, 197, 94, 0.35);
            color: inherit;
            padding: 0 2px;
            border-radius: 2px;
        }

        /* ========== 拖拽排序 ========== */
        .bookmark-card.dragging {
            opacity: 0.4;
            transform: scale(0.96) rotate(1deg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }

        .bookmark-card.drag-over {
            border-color: transparent;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.08), rgba(34, 197, 94, 0.03));
            box-shadow: inset 3px 0 0 var(--accent);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .header {
                padding: 4px;
            }

            .header-top {
                flex-wrap: wrap;
                gap: 6px;
                padding: 8px;
                border-radius: 8px;
            }

            .search-box {
                order: 3;
                max-width: 100%;
                width: 100%;
            }

            .bookmarks-grid {
                grid-template-columns: 1fr;
            }

            .logo span {
                display: none;
            }

            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                position: static;
                height: auto;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 4px;
                padding: 8px;
                border-radius: 0;
                margin: 0;
            }

            .sidebar-title {
                width: 100%;
            }

            .sidebar-item {
                flex: 0 0 auto;
                padding: 6px 10px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header class="header">
        <div class="header-top liquid-glass">
            <div class="logo">
                <img src="logo.png" alt="拾光">
                <h3>拾光</h3>
                <span>Markscape</span>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索书签...">
                <button class="clear-btn" id="clearSearchBtn" title="清空搜索">×</button>
            </div>
            <button class="btn btn-icon theme-toggle" id="themeToggle" title="切换主题">
                <svg class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <g class="theme-sun">
                        <circle class="theme-circle" cx="12" cy="12" r="5"/>
                        <g class="theme-rays">
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </g>
                    </g>
                    <path class="theme-moon" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- 布局容器：侧边栏 + 主内容 -->
    <div class="layout">
        <!-- 侧边栏 -->
        <aside class="sidebar liquid-glass" id="sidebar">
            <div class="sidebar-title">
                <span>分类</span>
                <button class="sidebar-title-btn" id="addCategoryBtn" title="新建分类">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <!-- 侧边栏项目由JS动态生成 -->
            <!-- 底部操作 -->
            <div class="sidebar-bottom">
                <button class="btn" id="importBtn">
                    <i class="fas fa-file-import"></i>
                    <span>导入</span>
                </button>
                <button class="btn" id="exportBtn">
                    <i class="fas fa-file-export"></i>
                    <span>导出</span>
                </button>
                <button class="btn btn-danger-icon" id="clearAllBtn" title="清空所有书签">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main">
            <div class="bookmarks-grid" id="bookmarksGrid">
                <!-- 书签卡片由JS动态生成 -->
            </div>
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon" onclick="openAddModal()" title="添加书签">
                    <i class="fas fa-bookmark"></i>
                </div>
                <div class="empty-title">点击图标添加书签</div>
                <div class="empty-desc">暂无书签</div>
            </div>
        </main>
    </div>

    <!-- 添加/编辑书签模态框 -->
    <div class="modal-overlay" id="bookmarkModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">添加书签</h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>URL *</label>
                    <div class="input-with-btn">
                        <input type="url" id="bookmarkUrl" placeholder="https://example.com">
                        <button type="button" class="input-btn" id="openUrlBtn" title="在新标签页打开">
                            <i class="fas fa-external-link-alt"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="bookmarkTitle" placeholder="网站标题">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="bookmarkDesc" placeholder="简短描述（可选）"></textarea>
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <div class="custom-select" id="categorySelect">
                        <input type="text" id="bookmarkCategory" placeholder="选择或输入分类名称" autocomplete="off">
                        <button type="button" class="clear-category-btn" id="clearCategoryBtn" onclick="clearCategoryInput()" title="清空分类">
                            <i class="fas fa-times"></i>
                        </button>
                        <i class="fas fa-chevron-down dropdown-icon"></i>
                        <div class="custom-select-dropdown" id="categoryDropdown">
                            <!-- 由JS动态生成 -->
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>标签（回车键添加逗号分隔）</label>
                    <input type="text" id="bookmarkTags" placeholder="工具, 开发, 学习">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveBookmark()">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加分类模态框 -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="categoryModalTitle">添加分类</h2>
                <button class="modal-close" onclick="closeCategoryModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>分类名称 *</label>
                    <input type="text" id="categoryName" placeholder="例如：工作、学习、娱乐">
                </div>
                <div class="form-group">
                    <label>图标和颜色</label>
                    <div class="icon-selector">
                        <div class="icon-preview">
                            <div class="icon-preview-box" id="iconPreviewBox" data-icon="fa-folder" data-color="#22C55E">
                                <i class="fas fa-folder"></i>
                            </div>
                        </div>
                        <div class="icon-color-row">
                            <div class="color-options" id="colorOptions"></div>
                        </div>
                        <div class="color-bar-wrapper">
                            <div class="color-bar" id="colorBar"></div>
                            <div class="color-bar-thumb" id="colorBarThumb"></div>
                        </div>
                        <div class="icon-grid" id="iconGrid"></div>
                        <input type="hidden" id="categoryIcon" value="fa-folder">
                        <input type="hidden" id="categoryColor" value="#22C55E">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeCategoryModal()">取消</button>
                <button class="btn btn-primary" onclick="saveCategory()">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除分类确认模态框 -->
    <div class="modal-overlay" id="deleteCategoryModal">
        <div class="modal">
            <div class="modal-header">
                <h2>确认删除分类</h2>
                <button class="modal-close" onclick="closeDeleteCategoryModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 16px; color: var(--text-secondary);">
                    确定要删除分类 "<span id="deleteCategoryName" style="color: var(--text-primary); font-weight: 500;"></span>" 吗？
                </p>
                <p style="margin-bottom: 8px; color: var(--text-muted); font-size: 0.875rem;">
                    该分类下有 <span id="deleteCategoryCount" style="color: var(--accent); font-weight: 600;"></span> 个书签
                </p>
            </div>
            <div class="modal-footer" style="flex-wrap: wrap; gap: 8px;">
                <button class="btn" onclick="closeDeleteCategoryModal()">取消</button>
                <button class="btn" onclick="confirmDeleteCategory(true)" style="background: var(--accent); border-color: var(--accent); color: #fff;">
                    <i class="fas fa-bookmark"></i> 保留书签
                </button>
                <button class="btn" onclick="confirmDeleteCategory(false)" style="background: #EF4444; border-color: #EF4444; color: #fff;">
                    <i class="fas fa-trash"></i> 一并删除
                </button>
            </div>
        </div>
    </div>

    <!-- 导出格式选择模态框 -->
    <div class="modal-overlay" id="exportModal">
        <div class="modal">
            <div class="modal-header">
                <h2>选择导出格式</h2>
                <button class="modal-close" onclick="closeExportModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" style="display: flex; gap: 16px; padding-top: 8px;">
                <button class="btn" onclick="doExport('json')" style="flex: 1; flex-direction: column; height: auto; padding: 20px; gap: 10px;">
                    <i class="fas fa-file-code" style="font-size: 1.8rem; color: #F59E0B;"></i>
                    <span style="font-weight: 600;">JSON</span>
                    <span style="font-size: 0.75rem; color: var(--text-muted);">完整数据，可再导入</span>
                </button>
                <button class="btn" onclick="doExport('html')" style="flex: 1; flex-direction: column; height: auto; padding: 20px; gap: 10px;">
                    <i class="fas fa-file-alt" style="font-size: 1.8rem; color: #3B82F6;"></i>
                    <span style="font-weight: 600;">HTML</span>
                    <span style="font-size: 0.75rem; color: var(--text-muted);">浏览器书签格式</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="importInput" accept=".json,.html" style="display: none;">

    <!-- Toast 通知容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 分类右键菜单 -->
    <div class="context-menu" id="categoryContextMenu">
        <div class="context-menu-item edit" id="ctxEditCategory">
            <i class="fas fa-pen"></i>
            <span>编辑分类</span>
        </div>
        <div class="context-menu-item delete" id="ctxDeleteCategory">
            <i class="fas fa-trash"></i>
            <span>删除分类</span>
        </div>
    </div>

    <!-- 悬浮添加按钮 -->
    <button class="fab-btn" id="addBookmarkBtn">
        <i class="fas fa-plus"></i>
        <span class="fab-btn-label">添加书签</span>
    </button>

    <script src="app.js"></script>
</body>
</html>
