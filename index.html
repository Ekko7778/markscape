<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书签管理器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== 基础重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== CSS变量 ========== */
        :root {
            --bg-primary: #0F172A;
            --bg-secondary: #1E293B;
            --bg-card: rgba(30, 41, 59, 0.85);
            --bg-card-hover: rgba(40, 55, 85, 0.90);
            --text-primary: #F8FAFC;
            --text-secondary: rgba(160, 180, 210, 0.85);
            --text-muted: #64748B;
            --accent: #22C55E;
            --accent-hover: #16A34A;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* 浅色模式 */
        [data-theme="light"] {
            --bg-primary: #F1F5F9;
            --bg-secondary: #FFFFFF;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-card-hover: rgba(255, 255, 255, 1);
            --text-primary: #1E293B;
            --text-secondary: rgba(60, 80, 100, 0.85);
            --text-muted: #94A3B8;
            --border: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 0, 0, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(0, 0, 0, 0.1);
            --shadow: rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        /* ========== 页面基础 ========== */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
        }

        /* ========== 固定头部模块 - Glassmorphism ========== */
        .fixed-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow-lg);
        }

        .header {
            padding: 16px 24px;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Logo */
        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.02em;
        }

        .logo i {
            color: var(--accent);
            font-size: 1.35rem;
        }

        /* 搜索框 */
        .search-box {
            flex: 1;
            max-width: 420px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-box input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* 操作按钮组 */
        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--border-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--border-hover);
            transform: rotate(15deg);
        }

        .theme-toggle i {
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        /* ========== 分类标签栏 ========== */
        .tabs-wrapper {
            padding: 0 24px;
            background: rgba(0, 0, 0, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .tabs {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 6px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .tabs::-webkit-scrollbar {
            height: 3px;
        }

        .tabs::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 3px;
        }

        .tab-wrapper {
            position: relative;
            display: inline-flex;
        }

        .tab {
            padding: 10px 18px;
            border-radius: 10px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3);
        }

        .tab i {
            font-size: 0.85rem;
        }

        .tab-count {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }

        .tab.active .tab-count {
            background: rgba(255, 255, 255, 0.25);
        }

        .tab-add {
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--glass-border);
        }

        .tab-add:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(34, 197, 94, 0.1);
        }

        /* 分类删除按钮 */
        .tab-delete {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--bg-primary);
            background: #EF4444;
            color: #fff;
            font-size: 0.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.7);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .tab-wrapper:hover .tab-delete {
            opacity: 1;
            transform: scale(1);
        }

        .tab-delete:hover {
            background: #DC2626;
            transform: scale(1.15);
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.5);
        }

        /* ========== 主内容区 ========== */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            padding-top: 32px;
        }

        /* 卡片网格 */
        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        /* 书签卡片 */
        .bookmark-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bookmark-card:hover {
            transform: translateY(-3px);
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3),
                        0 0 24px rgba(34, 197, 94, 0.08);
        }

        .bookmark-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .bookmark-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .bookmark-icon img {
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }

        .bookmark-icon i {
            font-size: 1.1rem;
            color: var(--accent);
        }

        .bookmark-info {
            flex: 1;
            min-width: 0;
        }

        .bookmark-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bookmark-url {
            font-size: 0.75rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bookmark-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .bookmark-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }

        .bookmark-tag {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent);
        }

        .bookmark-actions {
            display: none;
            gap: 4px;
            margin-left: auto;
        }

        .bookmark-card:hover .bookmark-actions {
            display: flex;
        }

        .action-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .action-btn.delete:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #EF4444;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 1rem;
            margin-bottom: 16px;
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            padding: 20px 24px;
            border-top: 1px solid var(--border);
        }

        /* ========== Toast 通知 ========== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px var(--shadow);
            animation: toastIn 0.3s ease;
            max-width: 320px;
        }

        .toast.success {
            border-color: var(--accent);
        }

        .toast.success i {
            color: var(--accent);
        }

        .toast.error {
            border-color: #EF4444;
        }

        .toast.error i {
            color: #EF4444;
        }

        .toast.warning {
            border-color: #F59E0B;
        }

        .toast.warning i {
            color: #F59E0B;
        }

        .toast.hide {
            animation: toastOut 0.3s ease forwards;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }

        /* ========== 搜索高亮 ========== */
        mark {
            background: rgba(34, 197, 94, 0.35);
            color: inherit;
            padding: 0 2px;
            border-radius: 2px;
        }

        /* ========== 拖拽排序 ========== */
        .bookmark-card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }

        .bookmark-card.drag-over {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.3);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .header-content {
                flex-wrap: wrap;
            }

            .search-box {
                order: 3;
                max-width: 100%;
                width: 100%;
            }

            .bookmarks-grid {
                grid-template-columns: 1fr;
            }

            .logo span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 固定头部模块 -->
    <div class="fixed-header">
        <!-- 顶部栏 -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-bookmark"></i>
                    <span>书签管理器</span>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="搜索书签...">
                </div>
                <div class="actions">
                    <button class="btn" id="importBtn" title="导入">
                        <i class="fas fa-file-import"></i>
                        <span>导入</span>
                    </button>
                    <button class="btn" id="exportBtn" title="导出">
                        <i class="fas fa-file-export"></i>
                        <span>导出</span>
                    </button>
                    <button class="btn btn-primary" id="addBookmarkBtn">
                        <i class="fas fa-plus"></i>
                        <span>添加书签</span>
                    </button>
                    <button class="theme-toggle" id="themeToggle" title="切换主题">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 分类标签栏 -->
        <nav class="tabs-wrapper">
            <div class="tabs" id="categoryTabs">
                <!-- 分类标签由JS动态生成 -->
            </div>
        </nav>
    </div>

    <!-- 主内容区 -->
    <main class="main">
        <div class="bookmarks-grid" id="bookmarksGrid">
            <!-- 书签卡片由JS动态生成 -->
        </div>
        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-bookmark"></i>
            <p>暂无书签</p>
            <button class="btn btn-primary" onclick="openAddModal()">
                <i class="fas fa-plus"></i>
                添加第一个书签
            </button>
        </div>
    </main>

    <!-- 添加/编辑书签模态框 -->
    <div class="modal-overlay" id="bookmarkModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">添加书签</h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>URL *</label>
                    <input type="url" id="bookmarkUrl" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="bookmarkTitle" placeholder="网站标题">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="bookmarkDesc" placeholder="简短描述（可选）"></textarea>
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="bookmarkCategory">
                        <!-- 由JS动态生成 -->
                    </select>
                </div>
                <div class="form-group">
                    <label>标签（逗号分隔）</label>
                    <input type="text" id="bookmarkTags" placeholder="工具, 开发, 学习">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveBookmark()">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加分类模态框 -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <div class="modal-header">
                <h2>添加分类</h2>
                <button class="modal-close" onclick="closeCategoryModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>分类名称 *</label>
                    <input type="text" id="categoryName" placeholder="例如：工作、学习、娱乐">
                </div>
                <div class="form-group">
                    <label>图标</label>
                    <select id="categoryIcon">
                        <option value="fa-folder">📁 文件夹</option>
                        <option value="fa-briefcase">💼 工作</option>
                        <option value="fa-graduation-cap">🎓 学习</option>
                        <option value="fa-gamepad">🎮 娱乐</option>
                        <option value="fa-code">💻 开发</option>
                        <option value="fa-palette">🎨 设计</option>
                        <option value="fa-newspaper">📰 新闻</option>
                        <option value="fa-shopping-cart">🛒 购物</option>
                        <option value="fa-heart">❤️ 收藏</option>
                        <option value="fa-star">⭐ 精选</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeCategoryModal()">取消</button>
                <button class="btn btn-primary" onclick="saveCategory()">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除分类确认模态框 -->
    <div class="modal-overlay" id="deleteCategoryModal">
        <div class="modal">
            <div class="modal-header">
                <h2>确认删除分类</h2>
                <button class="modal-close" onclick="closeDeleteCategoryModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 16px; color: var(--text-secondary);">
                    确定要删除分类 "<span id="deleteCategoryName" style="color: var(--text-primary); font-weight: 500;"></span>" 吗？
                </p>
                <p style="margin-bottom: 8px; color: var(--text-muted); font-size: 0.875rem;">
                    该分类下有 <span id="deleteCategoryCount" style="color: var(--accent); font-weight: 600;"></span> 个书签
                </p>
            </div>
            <div class="modal-footer" style="flex-wrap: wrap; gap: 8px;">
                <button class="btn" onclick="closeDeleteCategoryModal()">取消</button>
                <button class="btn" onclick="confirmDeleteCategory(true)" style="background: var(--accent); border-color: var(--accent); color: #fff;">
                    <i class="fas fa-bookmark"></i> 保留书签
                </button>
                <button class="btn" onclick="confirmDeleteCategory(false)" style="background: #EF4444; border-color: #EF4444; color: #fff;">
                    <i class="fas fa-trash"></i> 一并删除
                </button>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="importInput" accept=".json,.html" style="display: none;">

    <!-- Toast 通知容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
