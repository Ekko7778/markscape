<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书签管理器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== 基础重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ========== CSS变量 ========== */
        :root {
            --bg-primary: #0F172A;
            --bg-secondary: #1E293B;
            --bg-card: rgba(30, 41, 59, 0.85);
            --bg-card-hover: rgba(40, 55, 85, 0.90);
            --text-primary: #F8FAFC;
            --text-secondary: rgba(160, 180, 210, 0.85);
            --text-muted: #64748B;
            --accent: #22C55E;
            --accent-hover: #16A34A;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* 浅色模式 */
        [data-theme="light"] {
            --bg-primary: #F1F5F9;
            --bg-secondary: #FFFFFF;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-card-hover: rgba(255, 255, 255, 1);
            --text-primary: #1E293B;
            --text-secondary: rgba(60, 80, 100, 0.85);
            --text-muted: #94A3B8;
            --border: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 0, 0, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(0, 0, 0, 0.1);
            --shadow: rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        /* ========== 页面基础 ========== */
        html {
            overflow-y: auto;
            scrollbar-gutter: stable;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
        }

        /* 自定义滚动条 - 不滚动时隐藏 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: transparent;
            border-radius: 4px;
            transition: background 0.3s;
        }

        html:not(:hover)::-webkit-scrollbar-thumb,
        body:not(:hover)::-webkit-scrollbar-thumb {
            background: transparent;
        }

        html:hover::-webkit-scrollbar-thumb,
        body:hover::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Firefox 滚动条 */
        * {
            scrollbar-width: thin;
            scrollbar-color: transparent transparent;
        }

        html:hover,
        body:hover {
            scrollbar-color: var(--border) transparent;
        }

        /* ========== 导航栏 ========== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        /* 顶部栏 */
        .header-top {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .logo i {
            color: var(--accent);
        }

        .search-box {
            flex: 0 0 220px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 按钮分组 */
        .action-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 数据操作组前加分隔线 */
        .action-group.data-ops {
            padding-left: 12px;
            margin-left: 8px;
            border-left: 1px solid var(--border);
        }

        /* 次要操作组前加分隔线 */
        .secondary-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-left: 12px;
            margin-left: 8px;
            border-left: 1px solid var(--border);
        }

        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            height: 36px;
        }

        .btn:hover {
            background: var(--bg-card);
            border-color: var(--border-hover);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: var(--bg-card);
            border-color: var(--border-hover);
        }

        /* 危险操作图标按钮 */
        .btn-danger-icon:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #EF4444;
            color: #EF4444;
        }

        /* 添加分类按钮 */
        #addCategoryBtn:hover {
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 主题切换按钮 - 最右边 */
        .theme-toggle {
            position: fixed;
            top: 12px;
            right: 20px;
            z-index: 101;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            transform: rotate(15deg);
        }

        /* 标签栏 */
        .tabs-container {
            padding: 8px 20px 12px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: center;
        }

        .tabs-scroll-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            opacity: 0;
            transition: all 0.2s;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .tabs-scroll-btn.visible {
            opacity: 1;
        }

        .tabs-scroll-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .tab-wrapper {
            position: relative;
            z-index: 10;
            margin-top: 8px;
        }

        .tab {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            height: 32px;
            box-sizing: border-box;
        }

        .tab:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
        }

        .tab i {
            font-size: 0.8rem;
        }

        .tab-count {
            font-size: 0.7rem;
            padding: 1px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }

        .tab.active .tab-count {
            background: rgba(255,255,255,0.2);
        }

        /* 分类操作按钮（悬浮在右上角） */
        .tab-action {
            position: absolute;
            top: -8px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            font-size: 0.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.2s;
            z-index: 101;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .tab-wrapper:hover .tab-action {
            opacity: 1;
        }

        .tab-edit {
            right: 18px;
            background: var(--accent);
            color: #fff;
        }

        .tab-edit:hover {
            background: var(--accent-hover);
            transform: scale(1.15);
        }

        .tab-delete {
            right: -8px;
            background: #EF4444;
            color: #fff;
        }

        .tab-delete:hover {
            background: #DC2626;
            transform: scale(1.15);
        }

        .tabs-scroll-btn.left {
            margin-right: 4px;
        }

        .tabs-scroll-btn.right {
            margin-left: 4px;
        }

        .tabs-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .tabs {
            display: flex;
            align-items: center;
            gap: 4px;
            padding-top: 8px;
            margin-top: -8px;
            padding-bottom: 8px;
            margin-bottom: -8px;
            transition: transform 0.3s ease;
        }

        .tab-wrapper {
            position: relative;
            z-index: 10;
            margin-top: 8px;
        }

        .tab {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            height: 32px;
            box-sizing: border-box;
        }

        .tab:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
        }

        .tab i {
            font-size: 0.8rem;
        }

        .tab-count {
            font-size: 0.7rem;
            padding: 1px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }

        .tab.active .tab-count {
            background: rgba(255,255,255,0.2);
        }

        /* ========== 主内容区 ========== */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            padding-top: 32px;
        }

        /* 卡片网格 */
        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 12px;
        }

        /* 书签卡片 */
        .bookmark-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bookmark-card:hover {
            transform: translateY(-2px);
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3),
                        0 0 20px rgba(34, 197, 94, 0.08);
        }

        .bookmark-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .bookmark-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .bookmark-icon img {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .bookmark-icon i {
            font-size: 0.9rem;
            color: var(--accent);
        }

        .bookmark-info {
            flex: 1;
            min-width: 0;
        }

        .bookmark-title {
            font-size: 0.98rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bookmark-url {
            font-size: 0.75rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bookmark-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            height: 1.4em;
            margin-top: 2px;
        }

        .bookmark-tag {
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent);
        }

        .bookmark-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 6px;
            min-height: 20px;
        }

        .bookmark-tags {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .copy-btn {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 20px;
            border: none;
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent);
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-left: auto;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: rgba(34, 197, 94, 0.25);
        }

        .copy-btn.copied {
            background: var(--accent);
            color: #fff;
        }

        .copy-btn.copied span {
            display: none;
        }

        .copy-btn.copied::after {
            content: '已复制';
        }

        .bookmark-card:hover .copy-btn {
            display: flex;
        }

        .bookmark-actions {
            display: none;
            gap: 4px;
            margin-left: auto;
        }

        .bookmark-card:hover .bookmark-actions {
            display: flex;
        }

        .action-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .action-btn.delete:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #EF4444;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 24px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 2rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 0.95rem;
            margin-bottom: 16px;
            color: var(--text-secondary);
        }

        .empty-state .btn {
            margin-top: 4px;
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            padding: 20px 24px;
            border-top: 1px solid var(--border);
        }

        /* ========== Toast 通知 ========== */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px var(--shadow);
            animation: toastIn 0.3s ease;
            max-width: 320px;
        }

        .toast.success {
            border-color: var(--accent);
        }

        .toast.success i {
            color: var(--accent);
        }

        .toast.error {
            border-color: #EF4444;
        }

        .toast.error i {
            color: #EF4444;
        }

        .toast.warning {
            border-color: #F59E0B;
        }

        .toast.warning i {
            color: #F59E0B;
        }

        .toast.hide {
            animation: toastOut 0.3s ease forwards;
            margin-bottom: -48px;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
                margin-bottom: 0;
            }
            to {
                opacity: 0;
                transform: translateX(100%);
                margin-bottom: -48px;
            }
        }

        /* ========== 搜索高亮 ========== */
        mark {
            background: rgba(34, 197, 94, 0.35);
            color: inherit;
            padding: 0 2px;
            border-radius: 2px;
        }

        /* ========== 拖拽排序 ========== */
        .bookmark-card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }

        .bookmark-card.drag-over {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.3);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .header-content {
                flex-wrap: wrap;
            }

            .search-box {
                order: 3;
                max-width: 100%;
                width: 100%;
            }

            .bookmarks-grid {
                grid-template-columns: 1fr;
            }

            .logo span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header class="header">
        <div class="header-top">
            <div class="logo">
                <i class="fas fa-bookmark"></i>
                <span>书签管理器</span>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索书签...">
            </div>
            <div class="actions">
                <!-- 主要操作 -->
                <button class="btn btn-primary" id="addBookmarkBtn">
                    <i class="fas fa-plus"></i>
                    <span>添加书签</span>
                </button>
                <button class="btn" id="addCategoryBtn">
                    <i class="fas fa-folder-plus"></i>
                    <span>新建分类</span>
                </button>
                <!-- 数据操作 -->
                <div class="action-group data-ops">
                    <button class="btn" id="importBtn">
                        <i class="fas fa-file-import"></i>
                        <span>导入</span>
                    </button>
                    <button class="btn" id="exportBtn">
                        <i class="fas fa-file-export"></i>
                        <span>导出</span>
                    </button>
                </div>
                <!-- 次要操作（分隔线后） -->
                <div class="action-group secondary-actions">
                    <button class="btn btn-icon btn-danger-icon" id="clearAllBtn" title="清空所有书签">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>
            <button class="btn btn-icon theme-toggle" id="themeToggle" title="切换主题">
                <i class="fas fa-moon"></i>
            </button>
        </div>
        <div class="tabs-container">
            <button class="tabs-scroll-btn left" id="scrollLeftBtn" title="向左滚动">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="tabs-wrapper">
                <div class="tabs" id="categoryTabs"></div>
            </div>
            <button class="tabs-scroll-btn right" id="scrollRightBtn" title="向右滚动">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main">
        <div class="bookmarks-grid" id="bookmarksGrid">
            <!-- 书签卡片由JS动态生成 -->
        </div>
        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-bookmark"></i>
            <p>暂无书签</p>
            <button class="btn btn-primary" onclick="openAddModal()">
                <i class="fas fa-plus"></i>
                添加第一个书签
            </button>
        </div>
    </main>

    <!-- 添加/编辑书签模态框 -->
    <div class="modal-overlay" id="bookmarkModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">添加书签</h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>URL *</label>
                    <input type="url" id="bookmarkUrl" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="bookmarkTitle" placeholder="网站标题">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="bookmarkDesc" placeholder="简短描述（可选）"></textarea>
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <input type="text" id="bookmarkCategory" list="categoryList" placeholder="选择或输入分类名称">
                    <datalist id="categoryList">
                        <!-- 由JS动态生成 -->
                    </datalist>
                </div>
                <div class="form-group">
                    <label>标签（逗号分隔）</label>
                    <input type="text" id="bookmarkTags" placeholder="工具, 开发, 学习">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveBookmark()">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加分类模态框 -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="categoryModalTitle">添加分类</h2>
                <button class="modal-close" onclick="closeCategoryModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>分类名称 *</label>
                    <input type="text" id="categoryName" placeholder="例如：工作、学习、娱乐">
                </div>
                <div class="form-group">
                    <label>图标</label>
                    <select id="categoryIcon">
                        <option value="fa-folder">📁 文件夹</option>
                        <option value="fa-briefcase">💼 工作</option>
                        <option value="fa-graduation-cap">🎓 学习</option>
                        <option value="fa-gamepad">🎮 娱乐</option>
                        <option value="fa-code">💻 开发</option>
                        <option value="fa-palette">🎨 设计</option>
                        <option value="fa-newspaper">📰 新闻</option>
                        <option value="fa-shopping-cart">🛒 购物</option>
                        <option value="fa-heart">❤️ 收藏</option>
                        <option value="fa-star">⭐ 精选</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeCategoryModal()">取消</button>
                <button class="btn btn-primary" onclick="saveCategory()">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除分类确认模态框 -->
    <div class="modal-overlay" id="deleteCategoryModal">
        <div class="modal">
            <div class="modal-header">
                <h2>确认删除分类</h2>
                <button class="modal-close" onclick="closeDeleteCategoryModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 16px; color: var(--text-secondary);">
                    确定要删除分类 "<span id="deleteCategoryName" style="color: var(--text-primary); font-weight: 500;"></span>" 吗？
                </p>
                <p style="margin-bottom: 8px; color: var(--text-muted); font-size: 0.875rem;">
                    该分类下有 <span id="deleteCategoryCount" style="color: var(--accent); font-weight: 600;"></span> 个书签
                </p>
            </div>
            <div class="modal-footer" style="flex-wrap: wrap; gap: 8px;">
                <button class="btn" onclick="closeDeleteCategoryModal()">取消</button>
                <button class="btn" onclick="confirmDeleteCategory(true)" style="background: var(--accent); border-color: var(--accent); color: #fff;">
                    <i class="fas fa-bookmark"></i> 保留书签
                </button>
                <button class="btn" onclick="confirmDeleteCategory(false)" style="background: #EF4444; border-color: #EF4444; color: #fff;">
                    <i class="fas fa-trash"></i> 一并删除
                </button>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="importInput" accept=".json,.html" style="display: none;">

    <!-- Toast 通知容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
